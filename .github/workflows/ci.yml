name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # Tests are intentionally NOT in PR CI. Run them locally before pushing
  # via `./scripts/test.sh [unit|integration|evals|e2e|all]`. Re-add a
  # `test` job here when a second contributor joins.

  # Centralised path filter. Downstream jobs always run (so branch
  # protection's "required status checks" stay green) but gate their
  # real work on the matching output flag — a no-op job still reports
  # success.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      admin_console: ${{ steps.filter.outputs.admin_console }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'migrations/**'
              - 'alembic.ini'
              - 'app/database/**'
              - 'requirements.txt'
              - '.github/workflows/ci.yml'
            admin_console:
              - 'admin-console/**'
              - '.github/workflows/ci.yml'

  migrations-smoke:
    name: Alembic upgrade dry-run
    needs: changes
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - if: needs.changes.outputs.backend != 'true'
        run: echo "No backend changes — skipping."

      - if: needs.changes.outputs.backend == 'true'
        uses: actions/checkout@v4

      - if: needs.changes.outputs.backend == 'true'
        name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - if: needs.changes.outputs.backend == 'true'
        name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - if: needs.changes.outputs.backend == 'true'
        name: Bootstrap Supabase-specific roles
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: |
          psql "$DATABASE_URL" -q -c "CREATE ROLE service_role NOLOGIN;"

      - if: needs.changes.outputs.backend == 'true'
        name: Apply raw SQL baseline + stamp + upgrade head
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: |
          for f in migrations/*.sql; do
            [ -f "$f" ] || continue
            [[ "$f" == *_rollback.sql ]] && continue
            echo "Applying $(basename "$f")"
            psql "$DATABASE_URL" -f "$f" -v ON_ERROR_STOP=1 -q
          done
          alembic stamp 44a057c1f6eb
          alembic upgrade head
          alembic current

      - if: needs.changes.outputs.backend == 'true'
        name: Drift check (models vs DB schema)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: |
          # Fails if SQLAlchemy models drift from the DB schema. Catches
          # "forgot to add a new column to a migration" and similar bugs.
          alembic check

  admin-console-lint:
    name: TypeScript & lint check
    needs: changes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-console
    steps:
      - if: needs.changes.outputs.admin_console != 'true'
        run: echo "No admin-console changes — skipping."

      - if: needs.changes.outputs.admin_console == 'true'
        uses: actions/checkout@v4

      - if: needs.changes.outputs.admin_console == 'true'
        name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: admin-console/package-lock.json

      - if: needs.changes.outputs.admin_console == 'true'
        name: Install dependencies
        run: npm ci

      - if: needs.changes.outputs.admin_console == 'true'
        name: TypeScript type check
        run: npx tsc --noEmit

      - if: needs.changes.outputs.admin_console == 'true'
        name: Lint
        run: npm run lint
