name: Deploy

on:
  push:
    branches: [main]

# Prevent overlapping deploys if two pushes land in quick succession.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest (unit only)
        env:
          # Fake URL so models.py passes its import-time env check.
          # SQLAlchemy create_engine validates shape but doesn't connect.
          # Unit tests should not hit the DB; if one does it'll error out
          # loudly, which is the signal to fix the test (or move it to
          # tests/integration).
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          OPENAI_API_KEY: dummy
        run: python -m pytest tests/unit -q --disable-warnings

  migrate:
    name: Apply migrations (alembic upgrade head)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install alembic + app deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show current + pending revisions
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          alembic current || true
          alembic heads || true

      - name: Alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          alembic upgrade head
          alembic current

  deploy-vercel:
    name: Deploy admin console (Vercel CLI)
    needs: migrate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-console
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin-console/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel env + config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (with fresh schema pulled from prod at build time)
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          npm ci
          npx prisma db pull
          npx prisma generate
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artifacts
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # No deploy-railway job — Railway's "Wait for CI" toggle handles the bot:
  # https://docs.railway.com/deployments/github-autodeploys
  # Railway enters WAITING during this workflow, SKIPPED if any job fails,
  # and deploys the bot automatically once all jobs pass.
